<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#930013",
                    "tertiary-fixed": "#ffdad7",
                    "on-surface-variant": "#c3c6d7",
                    "on-primary-fixed-variant": "#003ea8",
                    "surface-tint": "#b4c5ff",
                    "on-tertiary-fixed": "#410004",
                    "inverse-on-surface": "#283044",
                    "secondary-container": "#00b954",
                    "tertiary-container": "#cf2c30",
                    "on-secondary": "#003915",
                    "tertiary": "#ffb3ad",
                    "surface-container": "#171f33",
                    "on-primary-container": "#eeefff",
                    "primary-fixed": "#dbe1ff",
                    "surface-container-low": "#131b2e",
                    "on-primary": "#002a78",
                    "on-primary-fixed": "#00174b",
                    "on-tertiary-container": "#ffecea",
                    "on-background": "#dae2fd",
                    "on-tertiary": "#68000a",
                    "on-error": "#690005",
                    "secondary": "#4ae176",
                    "background": "#0b1326",
                    "surface-dim": "#0b1326",
                    "surface-bright": "#31394d",
                    "outline": "#8d90a0",
                    "on-surface": "#dae2fd",
                    "secondary-fixed-dim": "#4ae176",
                    "primary": "#b4c5ff",
                    "surface-container-lowest": "#060e20",
                    "inverse-primary": "#0053db",
                    "surface-container-highest": "#2d3449",
                    "secondary-fixed": "#6bff8f",
                    "on-secondary-fixed-variant": "#005321",
                    "surface": "#0b1326",
                    "surface-container-high": "#222a3d",
                    "tertiary-fixed-dim": "#ffb3ad",
                    "surface-variant": "#2d3449",
                    "inverse-surface": "#dae2fd",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#002109",
                    "on-secondary-container": "#004119",
                    "error": "#ffb4ab",
                    "outline-variant": "#434655",
                    "error-container": "#93000a",
                    "primary-fixed-dim": "#b4c5ff",
                    "primary-container": "#2563eb"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #b4c5ff 0%, #2563eb 100%);
        }
        .frosted-obsidian {
            backdrop-filter: blur(12px);
            background: rgba(23, 31, 51, 0.8);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 no-border bg-[#0b1326]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="text-xl font-bold tracking-tighter text-[#dbe1ff] font-['Inter']">SAYAÇ</div>
<div class="flex gap-4">
<button class="p-2 rounded-full text-[#2d3449] hover:bg-[#171f33] transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="p-2 rounded-full text-[#2d3449] hover:bg-[#171f33] transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<!-- Error State Main Content -->
<main class="flex-grow flex items-center justify-center px-6 pt-16 pb-24">
<div class="max-w-md w-full text-center">
<!-- Asymmetric Tonal Layering for Error Icon -->
<div class="relative inline-block mb-12">
<div class="absolute -inset-4 bg-error/5 rounded-full blur-2xl"></div>
<div class="relative w-32 h-32 mx-auto bg-surface-container-low rounded-xl flex items-center justify-center transform -rotate-3 hover:rotate-0 transition-transform duration-500 overflow-hidden">
<!-- Glassmorphism overlay -->
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent"></div>
<span class="material-symbols-outlined text-6xl text-error" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<!-- Secondary decorative shape -->
<div class="absolute -bottom-4 -right-4 w-12 h-12 bg-surface-container-highest rounded-lg flex items-center justify-center transform rotate-12">
<span class="material-symbols-outlined text-outline text-xl" data-icon="sync_problem">sync_problem</span>
</div>
</div>
<!-- Typography Hierarchy -->
<h1 class="text-[28px] font-bold tracking-tight text-primary-fixed mb-4 font-headline">
                Bir Sorun Oluştu
            </h1>
<p class="text-on-surface-variant text-base leading-relaxed mb-10 px-4">
                Uygulama yüklenirken bir hata meydana geldi, lütfen tekrar deneyin.
            </p>
<!-- Action Area -->
<div class="flex flex-col gap-4">
<button class="kinetic-gradient text-on-primary font-bold py-4 px-8 rounded-xl shadow-[0_4px_40px_rgba(37,99,235,0.2)] active:scale-95 transition-all duration-200 uppercase tracking-widest text-xs">
                    Yeniden Dene
                </button>
<button class="bg-surface-container hover:bg-surface-container-highest text-outline font-medium py-4 px-8 rounded-xl transition-all duration-200 text-sm">
                    Destek ile İletişime Geç
                </button>
</div>
<!-- Decorative Ambient Glow -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
</div>
</main>
<!-- BottomNavBar (Suppressed based on Task-Focused rule, but if this were a top level destination, it would look like this) -->
<!-- The prompt implies a fallback/error screen which usually suppresses main navigation, but we follow the JSON anchors for component definition -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 bg-[#0b1326]/80 backdrop-blur-xl z-50 pb-safe shadow-[0_-4px_40px_rgba(37,99,235,0.08)]">
<a class="flex flex-col items-center justify-center text-[#2d3449] px-6 py-2 hover:text-[#b4c5ff] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="speed">speed</span>
<span class="text-[12px] font-medium tracking-widest uppercase mt-1">Ana Sayfa</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2d3449] px-6 py-2 hover:text-[#b4c5ff] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="restore">restore</span>
<span class="text-[12px] font-medium tracking-widest uppercase mt-1">Geçmiş</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2d3449] px-6 py-2 hover:text-[#b4c5ff] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[12px] font-medium tracking-widest uppercase mt-1">Ayarlar</span>
</a>
</nav>
</body></html>
